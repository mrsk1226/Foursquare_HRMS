name: mobile_app
description: Foursquare HRMS Mobile App.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  supabase_flutter: ^2.12.2
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  geolocator: ^14.0.2
  local_auth: ^3.0.1
  shared_preferences: ^2.2.1
  intl: ^0.20.2
  pdf: ^3.10.4
  printing: ^5.11.0
  google_fonts: ^8.0.2
  google_maps_flutter: ^2.5.0
  fl_chart: ^1.2.0
  shimmer: ^3.0.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.1
  http: ^1.6.0
  bloc: 9.2.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1E3A5F"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/4 square White Colour.png
    - assets/images/Four Square Logo blue.png

dependency_overrides:
  sign_in_with_apple: ^6.1.1
