name: mobile_app
description: Foursquare HRMS Mobile App.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Supabase
  supabase_flutter: ^2.0.0

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.5

  # Location
  geolocator: ^11.0.0
  permission_handler: ^11.0.0

  # Storage
  shared_preferences: ^2.2.1
  path_provider: ^2.1.1

  # UI
  google_fonts: ^6.0.0
  shimmer: ^3.0.0
  fl_chart: ^1.2.0

  # PDF
  pdf: ^3.10.4
  printing: ^5.11.0

  # Network
  http: ^1.2.0
  url_launcher: ^6.3.0

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1E3A5F"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
