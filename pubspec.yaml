name: mobile_app
description: Foursquare HRMS Mobile App.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  supabase_flutter: ^1.10.0
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  geolocator: ^10.1.0
  local_auth: ^2.1.6
  shared_preferences: ^2.2.1
  intl: ^0.18.1
  pdf: ^3.10.4
  printing: ^5.11.0
  google_fonts: ^6.1.0
  google_maps_flutter: ^2.5.0
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  permission_handler: ^11.3.0
  path_provider: ^2.1.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1E3A5F"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/4 square White Colour.png

dependency_overrides:
  sign_in_with_apple: ^6.1.1
